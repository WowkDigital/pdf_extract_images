<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Image Extractor – Extract images and text from PDF</title>
    <meta name="description" content="Fast and free application to extract images and text from PDF files directly in your browser.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="app-container">
        <header class="hero-section">
            <h1 class="title">PDF Image <span class="gradient-text">Extractor</span></h1>
            <p class="subtitle">Upload PDF files and instantly extract all hidden images and text. Secure, local, and lightning fast.</p>
        </header>

        <section class="upload-container" id="dropzone">
            <input type="file" id="pdfInput" accept=".pdf" multiple hidden>
            <div class="dropzone-content">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 16V8M12 8L9 11M12 8L15 11M20 12C20 16.4183 16.4183 20 12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4C16.4183 4 20 7.58172 20 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="text-group">
                    <span class="main-text">Drag & drop PDF files here</span>
                    <span class="sub-text">Or click to browse your computer</span>
                </div>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </section>

        <section class="results-container hidden" id="resultsSection">
            <div class="results-header">
                <h2>Extracted Content (<span id="imageCount">0</span> images)</h2>
                <button class="btn btn-primary" id="downloadAll">Download All (ZIP)</button>
            </div>
            <div id="resultsList">
                <!-- Documents will be added dynamically here -->
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 PDF Image Extractor. All files are processed locally in your browser.</p>
        </footer>
    </main>

    <!-- JSZip for compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
